<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>SpinRib · 2D Spine + Rib Slider</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./slide-styles.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f0eee9;
      -webkit-font-smoothing: antialiased;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: #15140f;
    }
    * { box-sizing: border-box; }
    .page {
      max-width: 1360px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .page-head {
      margin-bottom: 32px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .page-head h1 {
      font-family: "Fraunces", "Times New Roman", serif;
      font-weight: 500;
      letter-spacing: -0.02em;
      font-size: clamp(28px, 3vw, 40px);
      margin: 0;
    }
    .page-head p {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(21,20,15,0.55);
      margin: 0;
      max-width: 520px;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 28px;
      padding: 14px 18px;
      background: rgba(255,254,250,0.85);
      border: 1px solid rgba(21,20,15,0.12);
      border-radius: 8px;
      margin-bottom: 24px;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control-group > label.title {
      color: rgba(21,20,15,0.55);
    }
    .control-group select,
    .control-group .seg {
      font: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
    }
    .seg {
      display: inline-flex;
      border: 1px solid rgba(21,20,15,0.18);
      border-radius: 4px;
      overflow: hidden;
    }
    .seg button {
      background: transparent;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      color: rgba(21,20,15,0.55);
      font: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      border-right: 1px solid rgba(21,20,15,0.18);
    }
    .seg button:last-child { border-right: none; }
    .seg button.active {
      background: #15140f;
      color: #f6f5f1;
    }
    .seg button:not(.active):hover {
      background: rgba(21,20,15,0.04);
    }
    select {
      border: 1px solid rgba(21,20,15,0.18);
      border-radius: 4px;
      padding: 6px 10px;
      background: #ffffff;
      cursor: pointer;
    }

    .stage-wrap {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      border: 1px solid rgba(21,20,15,0.10);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }
    #slider {
      position: absolute;
      inset: 0;
    }

    .helper {
      margin-top: 18px;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(21,20,15,0.55);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-head">
      <h1>SpinRib · 2D Spine + Rib Slider</h1>
      <p>vertical spine of rows · ribs of uneven length · ↑↓←→ to navigate · click the mini-map to jump</p>
    </header>

    <div class="controls" id="controls">
      <div class="control-group">
        <label class="title">Theme</label>
        <div class="seg" data-key="theme">
          <button data-val="light" class="active">Light</button>
          <button data-val="dark">Dark</button>
        </div>
      </div>
      <div class="control-group">
        <label class="title">Mini-map</label>
        <div class="seg" data-key="miniSize">
          <button data-val="sm">SM</button>
          <button data-val="md" class="active">MD</button>
          <button data-val="lg">LG</button>
        </div>
      </div>
      <div class="control-group">
        <label class="title">Chrome</label>
        <select id="chrome">
          <option value="arrows" selected>Arrows only</option>
          <option value="arrows-with-hints">Arrows + key labels</option>
          <option value="keyboard">Keyboard cluster</option>
          <option value="both">Arrows + keyboard</option>
        </select>
      </div>
      <div class="control-group">
        <label class="title">Transition</label>
        <select id="transition">
          <option value="slide" selected>Slide</option>
          <option value="fade">Fade</option>
          <option value="cut">Cut (instant)</option>
        </select>
      </div>
    </div>

    <div class="stage-wrap">
      <div id="slider"></div>
    </div>

    <p class="helper">Tip — focus the page (click anywhere) and use the arrow keys.</p>
  </div>

  <script type="module">
    import { SpinRib } from '../../src/spinrib.js';
    import { SPINES } from './sample-data.js';
    import { editorialRenderer, editorialRowLabel } from './slide-renderer.js';

    // The editorial renderer is supplied by THIS demo, not the library.
    // It reads SPINES out of closure to look up row-level fields by (y, x).
    const slider = new SpinRib({
      container: document.getElementById('slider'),
      spines: SPINES,
      renderSlide: editorialRenderer(SPINES),
      rowLabel: editorialRowLabel,
      theme: 'light',
      miniSize: 'md',
      chrome: 'arrows',
      transition: 'slide',
    });

    // wire up controls
    const segs = document.querySelectorAll('.seg');
    segs.forEach((seg) => {
      const key = seg.dataset.key;
      seg.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', () => {
          seg.querySelectorAll('button').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          const val = btn.dataset.val;
          if (key === 'theme') {
            slider.setTheme(val);
          } else if (key === 'miniSize') {
            slider.setMiniSize(val);
          }
        });
      });
    });

    document.getElementById('chrome').addEventListener('change', (e) => {
      slider.setChrome(e.target.value);
    });
    document.getElementById('transition').addEventListener('change', (e) => {
      slider.setTransition(e.target.value);
    });
  </script>
</body>
</html>
